  <!--
    Set browser chrome colour from saved theme before first paint.
    Must run synchronously in <head> — defer/async would be too late.
    Mirrors --theme-background values in styles.css exactly.
    Falls back to #0A0F0A (ibm3279-green default) if no saved theme.
  -->
  <script>
    (function() {
      var backgrounds = {
        'ibm3279-green':          '#0A0F0A',
        'teletype-blue-green':    '#0C1010',
        'pet2001-green':          '#060A06',
        'ibm3279-bitcoin-orange': '#0B0800',
        'hazeltine-teal':         '#090E0E',
        'zenith-green':           '#0B100B',
        'adm3a-green':            '#070B07',
        'kaypro-green':           '#060A06',
        'white':                  '#0E0E0F',
        'vt100-amber':            '#0C0800',
        'apple2-green':           '#000000',
        'commodore64':            '#2B2290',
      };
      var saved = localStorage.getItem('theme');
      var bg = (saved && backgrounds[saved]) ? backgrounds[saved] : '#0A0F0A';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', bg);
    })();
  </script>
