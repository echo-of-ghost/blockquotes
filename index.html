<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Discover inspiring Bitcoin quotes. A curated collection of insights about the world's first cryptocurrency."
    />
    <meta name="author" content="blockquote.sh" />
    <meta name="theme-color" content="#0A0F0A" />
    <!--
    The favicon link must appear BEFORE the inline script below so that
    querySelector('link[rel="icon"]') finds it synchronously on first parse.
    The script patches href to a PNG data URL before first paint — no SVG flash.
  -->
    <link
      rel="icon"
      type="image/png"
      href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGMI/98DAAOTAeMKU0PdAAAAAElFTkSuQmCC"
    />
    <!--
    Set browser chrome colour AND favicon from saved theme before first paint.
    Must run synchronously in <head> — defer/async would be too late.

    Three jobs in one pass:
      1. theme-color  — browser chrome tint (mobile Safari / Android)
      2. favicon      — inline PNG data URL so the tab icon is correct instantly,
                        with no flash of the default SVG before colours.js fires
      3. manifest     — patches manifest.json theme_color via URL so the PWA
                        install prompt / splash screen matches without a round-trip

    Favicon data URLs are pre-rendered 1×1 solid-colour PNGs (minimal valid PNG,
    ~100 bytes each). The canvas approach in colours.js handles live theme changes;
    this script only handles the cold-load case where JS hasn't run yet.

    Mirrors --theme-background (backgrounds) and --primary-color (favicons) from
    styles.css exactly. Falls back to ibm3279-green defaults if no saved theme.
  -->
    <script>
      (function () {
        var backgrounds = {
          "ibm3279-green": "#0A0F0A",
          "teletype-blue-green": "#0C1010",
          "pet2001-green": "#060A06",
          "ibm3279-bitcoin-orange": "#0B0800",
          "wyse50-amber": "#0A0700",
          "zenith-green": "#0B100B",
          "adm3a-green": "#070B07",
          "kaypro-green": "#060A06",
          "vt05-white": "#0E0E0F",
          "vt100-amber": "#0C0800",
          "apple2-green": "#000000",
          commodore64: "#2B2290",
          nextstep: "#111111",
        };
        // 1×1 solid-colour PNGs — one per theme, matching --primary-color in styles.css.
        // Generated from raw PNG binary; no canvas, no network request.
        var favicons = {
          "ibm3279-green":
            "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGMI/98DAAOTAeMKU0PdAAAAAElFTkSuQmCC",
          "teletype-blue-green":
            "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGNYcmIDAAQwAh3GXOuYAAAAAElFTkSuQmCC",
          "pet2001-green":
            "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGNg+O8CAAJGAUT/Xrl6AAAAAElFTkSuQmCC",
          "ibm3279-bitcoin-orange":
            "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGP4PlkKAAQpAaUswe40AAAAAElFTkSuQmCC",
          "wyse50-amber":
            "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGP4v48BAAR9Ab7wVOJMAAAAAElFTkSuQmCC",
          "zenith-green":
            "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGOo/18PAAP+Af4yKt8SAAAAAElFTkSuQmCC",
          "adm3a-green":
            "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGNY8T8BAARaAgg8v+rAAAAAAElFTkSuQmCC",
          "kaypro-green":
            "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGMo+18GAAPaAew7xx8bAAAAAElFTkSuQmCC",
          "vt05-white":
            "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGO4du0YAAT4AnNa2YdtAAAAAElFTkSuQmCC",
          "vt100-amber":
            "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGP4v4EBAARhAbBS7+4CAAAAAElFTkSuQmCC",
          "apple2-green":
            "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGNQ+R8EAALAAXaCjZZAAAAAAElFTkSuQmCC",
          commodore64:
            "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGMoyTwBAAL6AaZNjKTQAAAAAElFTkSuQmCC",
          nextstep:
            "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGN49OgGAAVGAp2oKjHOAAAAAElFTkSuQmCC",
        };
        var saved = localStorage.getItem("theme");
        var theme = saved && backgrounds[saved] ? saved : "ibm3279-green";

        // 1. Set browser chrome colour
        document
          .querySelector('meta[name="theme-color"]')
          .setAttribute("content", backgrounds[theme]);

        // 2. Set favicon inline — replaces the SVG href before first paint
        var link = document.querySelector('link[rel="icon"]');
        if (link && favicons[theme]) {
          link.type = "image/png";
          link.href = favicons[theme];
        }
      })();
    </script>
    <meta property="og:title" content="blockquote.sh" />
    <meta
      property="og:description"
      content="A curated collection of insights about the world's first cryptocurrency."
    />
    <meta property="og:image" content="https://blockquote.sh/assets/og.png" />
    <meta property="og:url" content="https://blockquote.sh" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="blockquote.sh" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="blockquote.sh" />
    <meta
      name="twitter:description"
      content="A curated collection of insights about the world's first cryptocurrency."
    />
    <meta name="twitter:image" content="https://blockquote.sh/assets/og.png" />
    <link rel="canonical" href="https://blockquote.sh" />
    <meta name="color-scheme" content="dark" />
    <title>blockquote.sh</title>

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "blockquote.sh",
        "description": "A curated collection of insights about the world's first cryptocurrency.",
        "url": "https://blockquote.sh",
        "author": {
          "@type": "Organization",
          "name": "blockquote.sh"
        }
      }
    </script>

    <!--
    colours.js takes over favicon management for live theme switching via canvas.
    The link above is patched synchronously by the inline script before first paint.
  -->

    <!-- Preload critical resources -->
    <link rel="preload" href="assets/styles.css" as="style" />
    <link
      rel="preload"
      href="data/bitcoin_quotes.json"
      as="fetch"
      crossorigin
    />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&display=swap"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&display=swap"
    /></noscript>

    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />
    <link rel="dns-prefetch" href="//cdnjs.cloudflare.com" />

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />

    <!-- Load stylesheets -->
    <link rel="stylesheet" href="assets/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

    <main>
      <section
        id="quote-container"
        aria-live="polite"
        aria-label="Bitcoin quotes display area"
      >
        <noscript>
          <p>
            "Bitcoin is a remarkable cryptographic achievement and the ability

    </main>
    <!-- ES modules — only entry points listed; everything else is imported transitively -->
    <script type="module" src="scripts/colours.js"></script>
    <script type="module" src="scripts/script.js"></script>
  </body>
</html>
